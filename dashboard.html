<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ticker Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
      :root {
        --bg: #0a0a0f;
        --bg-card: #111118;
        --bg-card-hov: #161621;
        --bg-input: #08080d;
        --border: #1e1e2e;
        --border-dim: rgba(30, 30, 46, 0.5);
        --text: #cdd6f4;
        --text-dim: #585b70;
        --cyan: #89dceb;
        --green: #a6e3a1;
        --red: #f38ba8;
        --yellow: #f9e2af;
        --orange: #fab387;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Cascadia Code", "Fira Code", "JetBrains Mono",
          "Courier New", monospace;
        font-size: 13px;
        line-height: 1.5;
        min-height: 100vh;
      }

      .hidden {
        display: none !important;
      }

      /* ── App Header ── */
      .app-header {
        background: #0d0d15;
        border-bottom: 1px solid var(--border);
        padding: 10px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .app-header h1 {
        font-size: 15px;
        color: var(--cyan);
        font-weight: 600;
        letter-spacing: 0.06em;
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 14px;
        font-size: 11px;
        color: var(--text-dim);
      }
      .countdown-badge {
        background: #1a1a28;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 2px 9px;
        color: var(--cyan);
        font-size: 11px;
        min-width: 70px;
        text-align: center;
      }

      /* ── Pool Grid ── */
      .grid-wrap {
        padding: 20px 24px;
        max-width: 1400px;
        margin: 0 auto;
      }
      .grid-label {
        font-size: 11px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 14px;
      }
      #pool-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
        gap: 10px;
      }

      /* ── Pool Card ── */
      .pool-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 14px 14px 10px;
        cursor: pointer;
        transition: background 0.12s, border-color 0.12s, box-shadow 0.12s;
        overflow: hidden;
      }
      .pool-card:hover {
        background: var(--bg-card-hov);
        border-color: var(--cyan);
        box-shadow: 0 0 14px rgba(137, 220, 235, 0.07);
      }
      .card-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 6px;
      }
      .card-pool-id {
        font-size: 10px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .card-pair {
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 1px;
      }
      .card-price {
        font-size: 19px;
        font-weight: 700;
        color: var(--cyan);
        font-variant-numeric: tabular-nums;
        margin: 6px 0 3px;
      }
      .card-liquidity {
        font-size: 11px;
        color: var(--text-dim);
        margin-bottom: 9px;
      }
      .badge-row {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        padding: 2px 7px;
        border-radius: 3px;
        font-size: 11px;
        font-weight: 500;
      }
      .badge-lbl {
        font-size: 10px;
        opacity: 0.65;
      }
      .badge-pos {
        background: rgba(166, 227, 161, 0.12);
        color: var(--green);
        border: 1px solid rgba(166, 227, 161, 0.25);
      }
      .badge-neg {
        background: rgba(243, 139, 168, 0.12);
        color: var(--red);
        border: 1px solid rgba(243, 139, 168, 0.25);
      }
      .badge-neu {
        background: rgba(88, 91, 112, 0.18);
        color: var(--text-dim);
        border: 1px solid var(--border);
      }

      .sparkline-wrap {
        height: 36px;
      }
      .sparkline-wrap canvas {
        display: block;
        width: 100% !important;
        height: 36px !important;
      }

      /* ── Detail View ── */
      .detail-wrap {
        padding: 20px 24px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .detail-top {
        display: flex;
        align-items: flex-start;
        gap: 18px;
        margin-bottom: 22px;
        flex-wrap: wrap;
      }
      .back-btn {
        background: #1a1a28;
        border: 1px solid var(--border);
        color: var(--cyan);
        padding: 7px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
        white-space: nowrap;
        flex-shrink: 0;
        margin-top: 2px;
        transition: background 0.12s, border-color 0.12s;
      }
      .back-btn:hover {
        background: #222236;
        border-color: var(--cyan);
      }

      .detail-meta h2 {
        font-size: 24px;
        font-weight: 700;
        color: var(--cyan);
        line-height: 1.2;
      }
      .detail-meta .meta-row {
        display: flex;
        gap: 16px;
        align-items: baseline;
        flex-wrap: wrap;
        margin-top: 5px;
      }
      .detail-meta .meta-id {
        font-size: 11px;
        color: var(--text-dim);
      }
      .detail-meta .meta-price {
        font-size: 22px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .detail-meta .meta-ts {
        font-size: 11px;
        color: var(--text-dim);
      }

      .section {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 14px 16px;
        margin-bottom: 14px;
      }
      .section h3 {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--text-dim);
        margin-bottom: 12px;
        padding-bottom: 7px;
        border-bottom: 1px solid var(--border);
      }

      /* ── Variance Table ── */
      .var-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
      }
      .var-table th {
        text-align: left;
        padding: 5px 10px;
        color: var(--text-dim);
        font-weight: 500;
        border-bottom: 1px solid var(--border);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .var-table td {
        padding: 7px 10px;
        border-bottom: 1px solid var(--border-dim);
      }
      .var-table tr:last-child td {
        border-bottom: none;
      }
      .var-table .iv-cell {
        color: var(--text);
        font-weight: 600;
        min-width: 64px;
      }
      .var-table .ts-cell {
        color: var(--text-dim);
        font-size: 11px;
      }

      .vc-null {
        color: var(--text-dim);
      }
      .vc-zero {
        color: var(--text-dim);
      }
      .vc-tp {
        color: #e6cc6e;
      } /* tiny positive  <1% */
      .vc-tn {
        color: #e6cc6e;
      } /* tiny negative  <1% */
      .vc-mp {
        color: var(--orange);
      } /* mid  1–5% */
      .vc-mn {
        color: var(--orange);
      }
      .vc-bp {
        color: var(--green);
        font-weight: 700;
      } /* big >5% */
      .vc-bn {
        color: var(--red);
        font-weight: 700;
      }

      /* ── Charts ── */
      .chart-wrap {
        position: relative;
        height: 200px;
      }

      /* ── Activity Log ── */
      .act-log {
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 10px 12px;
        font-size: 12px;
        max-height: 520px;
        overflow-y: auto;
        font-variant-numeric: tabular-nums;
      }
      .log-run {
        color: var(--cyan);
        font-weight: 600;
        padding: 6px 0 3px;
      }
      .log-run:not(:first-child) {
        margin-top: 12px;
        border-top: 1px solid var(--border-dim);
        padding-top: 10px;
      }
      .log-iv {
        color: var(--text-dim);
        padding: 2px 0 2px 2px;
      }
      .log-line {
        display: grid;
        grid-template-columns: 15ch 1fr;
        padding: 1px 0 1px 4px;
        gap: 4px;
      }
      .log-fn {
        color: var(--text-dim);
      }
      .log-vals {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .lp {
        color: var(--text-dim);
      }
      .lc {
        color: var(--text);
      }
      .ld-p {
        color: var(--green);
      }
      .ld-n {
        color: var(--red);
      }
      .ld-z {
        color: var(--text-dim);
      }
      .lpc-p {
        color: var(--green);
      }
      .lpc-n {
        color: var(--red);
      }
      .lpc-z {
        color: var(--text-dim);
      }

      /* ── Aggregated Price Bar ── */
      .agg-bar {
        padding: 12px 24px 0;
        max-width: 1400px;
        margin: 0 auto;
      }
      .agg-bar-label {
        font-size: 10px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 8px;
      }
      .agg-cards {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .agg-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px 14px;
        cursor: pointer;
        min-width: 155px;
        transition: background 0.12s, border-color 0.12s;
      }
      .agg-card:hover {
        background: var(--bg-card-hov);
        border-color: var(--cyan);
      }
      .agg-card.divergent {
        border-color: var(--red);
      }
      .agg-card.implied {
        border-color: var(--orange);
        opacity: 0.9;
      }
      .agg-card.unavailable {
        opacity: 0.5;
        filter: grayscale(0.4);
      }
      .agg-card-symbol {
        font-size: 11px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 2px;
      }
      .agg-card-price {
        font-size: 17px;
        font-weight: 700;
        color: var(--cyan);
        font-variant-numeric: tabular-nums;
      }
      .agg-card-price.unavailable {
        color: var(--text-dim);
        font-size: 13px;
        font-weight: 400;
      }
      .agg-card-ext {
        font-size: 10px;
        color: var(--text-dim);
        margin-top: 1px;
      }
      .agg-card-div {
        font-size: 11px;
        font-weight: 600;
        margin-top: 3px;
      }
      .agg-card-div.ok {
        color: var(--green);
      }
      .agg-card-div.warn {
        color: var(--orange);
      }
      .agg-card-div.danger {
        color: var(--red);
      }
      .agg-card-badge {
        display: inline-block;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 1px 5px;
        border-radius: 3px;
        margin-left: 4px;
        vertical-align: middle;
      }
      .agg-card-badge.implied {
        background: rgba(250, 179, 135, 0.18);
        color: var(--orange);
      }
      .agg-card-badge.unavailable {
        background: rgba(127, 132, 156, 0.18);
        color: var(--text-dim);
      }
      .agg-card-warn-icon {
        font-size: 11px;
        cursor: help;
        margin-left: 4px;
        position: relative;
        display: inline-block;
      }
      .agg-card-warn-icon .warn-tooltip {
        display: none;
        position: absolute;
        bottom: 120%;
        left: 50%;
        transform: translateX(-50%);
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 6px 9px;
        font-size: 10px;
        color: var(--text-dim);
        white-space: nowrap;
        min-width: 200px;
        max-width: 320px;
        white-space: normal;
        z-index: 10;
        line-height: 1.5;
      }
      .agg-card-warn-icon:hover .warn-tooltip {
        display: block;
      }

      /* ── View 3: Token detail ── */
      .token-detail-wrap {
        padding: 20px 24px;
        max-width: 900px;
        margin: 0 auto;
      }

      /* ── Misc ── */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 160px;
        color: var(--text-dim);
      }

      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-dim);
      }
    </style>
  </head>
  <body>
    <!-- ─── App Header ─── -->
    <header class="app-header">
      <h1>◈ Ticker Analytics</h1>
      <div class="header-right">
        <span id="last-update-lbl">Loading…</span>
        <span class="countdown-badge">↻ <span id="countdown">60</span>s</span>
      </div>
    </header>

    <!-- ─── Aggregated Price Bar (always visible) ─── -->
    <div id="agg-bar-wrap" class="agg-bar">
      <div class="agg-bar-label">Token USD Prices</div>
      <div class="agg-cards" id="agg-cards"></div>
    </div>

    <!-- ─── View 1: Pool Grid ─── -->
    <div id="view-grid">
      <div class="grid-wrap">
        <div class="grid-label" id="grid-label">Live Pool Overview</div>
        <div id="pool-grid"><div class="loading">Loading data…</div></div>
      </div>
    </div>

    <!-- ─── View 3: Token VWAP History ─── -->
    <div id="view-token" class="hidden">
      <div class="token-detail-wrap">
        <div class="detail-top">
          <button class="back-btn" onclick="showGrid()">← Back</button>
          <div class="detail-meta">
            <h2 id="t-symbol"></h2>
            <div class="meta-row">
              <span class="meta-price" id="t-price"></span>
              <span class="meta-ts" id="t-divergence"></span>
            </div>
          </div>
        </div>
        <div class="section">
          <h3>VWAP History (internal vs external reference)</h3>
          <div class="chart-wrap" style="height: 260px">
            <canvas id="token-vwap-chart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- ─── View 2: Pool Detail ─── -->
    <div id="view-detail" class="hidden">
      <div class="detail-wrap">
        <div class="detail-top">
          <button class="back-btn" onclick="showGrid()">← Back</button>
          <div class="detail-meta">
            <h2 id="d-pair"></h2>
            <div class="meta-row">
              <span class="meta-id" id="d-pool-id"></span>
              <span class="meta-price" id="d-price"></span>
              <span class="meta-ts" id="d-ts"></span>
            </div>
          </div>
        </div>

        <div class="section">
          <h3>Variance by Interval</h3>
          <table class="var-table">
            <thead>
              <tr>
                <th>Interval</th>
                <th>Price Δ%</th>
                <th>USD Price Δ%</th>
                <th>Base Vol Δ%</th>
                <th>Target Vol Δ%</th>
                <th>Run At</th>
              </tr>
            </thead>
            <tbody id="var-body"></tbody>
          </table>
        </div>

        <div class="section">
          <h3>Price History</h3>
          <div class="chart-wrap"><canvas id="price-chart"></canvas></div>
        </div>

        <div class="section">
          <h3>USD Price History</h3>
          <div class="chart-wrap"><canvas id="usd-price-chart"></canvas></div>
        </div>

        <div class="section">
          <h3>Volume History</h3>
          <div class="chart-wrap"><canvas id="vol-chart"></canvas></div>
        </div>

        <div class="section">
          <h3>Activity Log</h3>
          <div class="act-log" id="act-log"></div>
        </div>
      </div>
    </div>

    <script>
      // ══════════════════════════════════════════════════════
      // State
      // ══════════════════════════════════════════════════════
      let snapshots = [],
        reports = [];
      let poolTS = {}; // pool_id → { ticker_id, timestamps[], prices[], baseVols[], targetVols[], liquidity[] }
      let latestBI = {}; // pool_id → interval → latest PoolVariance + run_at
      let logByPool = {}; // pool_id → [...log entries sorted newest-first]
      let allPools = []; // sorted pool_id list

      // Pricing data
      let latestAggregated = []; // AggregatedPrice[] from the most recent report
      let latestPoolPrices = {}; // pool_id → PoolPriceUSD (from latest report)
      let tokenHistory = {}; // symbol → { timestamps[], internalPrices[], externalPrices[] }

      let currentView = "grid";
      let selectedPool = null;
      let selectedToken = null;
      let priceChart = null;
      let volChart = null;
      let usdPriceChart = null;
      let tokenVwapChart = null;
      let countdownVal = 60;
      let countdownTimer = null;

      // ══════════════════════════════════════════════════════
      // Token / label helpers
      // ══════════════════════════════════════════════════════
      const TOKEN_MAP = {
        "token-stx-v-1-2": "STX",
        "sbtc-token": "sBTC",
        "token-aeusdc": "aeUSDC",
        usdcx: "USDCx",
      };

      const STABLECOIN_CONTRACTS = new Set([
        "usdcx",
        "token-aeusdc",
        "usdh-token-v1",
      ]);
      const TOLERANCE_PCT = {
        STX: 2,
        sBTC: 2,
        aeUSDC: 0.1,
        USDCx: 0.1,
        USDh: 0.1,
      };

      function isStablecoin(contractId) {
        const suffix = contractId.split(".").pop();
        return STABLECOIN_CONTRACTS.has(suffix);
      }

      const TOKEN_DECIMALS = {
        "token-stx-v-1-2": 6,
        "sbtc-token": 8,
        "token-aeusdc": 6,
        usdcx: 6,
        "usdh-token-v1": 8,
      };

      const DEFAULT_POOL_PRICE_SCALE_BPS = 1e8;

      function getDecimals(contractId) {
        const suffix = contractId.split(".").pop();
        return TOKEN_DECIMALS[suffix] ?? 6;
      }

      function scaleBinPrice(price, baseCurrency, targetCurrency) {
        const decimalsX = getDecimals(baseCurrency);
        const decimalsY = getDecimals(targetCurrency);
        return (
          (price * Math.pow(10, decimalsX - decimalsY)) /
          DEFAULT_POOL_PRICE_SCALE_BPS
        );
      }

      function tokenName(contractId) {
        const suffix = contractId.split(".").pop();
        return TOKEN_MAP[suffix] || suffix;
      }

      function pairName(ticker_id) {
        // ticker_id = "ADDR.contract_ADDR.contract" — one underscore separator
        const idx = ticker_id.indexOf("_");
        if (idx < 0) return ticker_id;
        return (
          tokenName(ticker_id.slice(0, idx)) +
          "/" +
          tokenName(ticker_id.slice(idx + 1))
        );
      }

      function fmtNum(n, dp = 4) {
        if (n == null || isNaN(n)) return "—";
        const a = Math.abs(n);
        if (a >= 1e12) return (n / 1e12).toFixed(2) + "T";
        if (a >= 1e9) return (n / 1e9).toFixed(2) + "B";
        if (a >= 1e6) return (n / 1e6).toFixed(2) + "M";
        if (a >= 1e3) return (n / 1e3).toFixed(2) + "K";
        if (a >= 1) return n.toFixed(2);
        return n.toFixed(dp);
      }

      // Price-specific formatter: up to 8 decimal places, trailing zeros stripped.
      function fmtPrice(n) {
        if (n == null || isNaN(n)) return "—";
        const a = Math.abs(n);
        if (a >= 1) return n.toFixed(2);
        return n.toFixed(8).replace(/0+$/, "").replace(/\.$/, "");
      }

      function fmtTime(iso) {
        if (!iso) return "—";
        const d = new Date(iso);
        return (
          d.toLocaleTimeString("en-US", {
            hour12: false,
            hour: "2-digit",
            minute: "2-digit",
          }) +
          " · " +
          d.toLocaleDateString("en-US", { month: "short", day: "numeric" })
        );
      }

      // ══════════════════════════════════════════════════════
      // Data pipeline
      // ══════════════════════════════════════════════════════
      async function fetchJsonArray(path) {
        const res = await fetch(path);
        if (res.status === 404) return [];
        if (!res.ok) {
          throw new Error(`Failed to load ${path}: ${res.status} ${res.statusText}`);
        }
        const data = await res.json();
        if (!Array.isArray(data)) {
          throw new Error(`Unexpected response shape for ${path}`);
        }
        return data;
      }

      async function fetchData() {
        const [snap, rep] = await Promise.all([
          fetchJsonArray("data/snapshots.json"),
          fetchJsonArray("data/reports.json"),
        ]);
        snapshots = snap;
        reports = rep;
        processData();
        const now = new Date();
        document.getElementById("last-update-lbl").textContent =
          "Updated " + fmtTime(now.toISOString());
      }

      function processData() {
        // ── snapshots → per-pool time series ──────────────────
        poolTS = {};
        for (const snap of snapshots) {
          for (const t of snap.tickers) {
            const { pool_id } = t;
            if (!poolTS[pool_id]) {
              poolTS[pool_id] = {
                ticker_id: t.ticker_id,
                timestamps: [],
                prices: [],
                baseVols: [],
                targetVols: [],
                liquidity: [],
              };
            }
            const s = poolTS[pool_id];
            s.timestamps.push(snap.timestamp);
            s.prices.push(
              scaleBinPrice(
                parseFloat(t.last_price),
                t.base_currency,
                t.target_currency
              )
            );
            s.baseVols.push(parseFloat(t.base_volume));
            s.targetVols.push(parseFloat(t.target_volume));
            s.liquidity.push(parseFloat(t.liquidity_in_usd));
          }
        }

        // ── reports → latest-by-interval, activity log ────────
        latestBI = {};
        logByPool = {};
        for (const report of reports) {
          const {
            interval,
            run_at,
            snapshot_timestamp,
            snapshot_age_minutes,
            pools,
          } = report;
          for (const pool of pools) {
            const { pool_id } = pool;

            // latest per pool+interval
            if (!latestBI[pool_id]) latestBI[pool_id] = {};
            if (
              !latestBI[pool_id][interval] ||
              run_at > latestBI[pool_id][interval].run_at
            ) {
              latestBI[pool_id][interval] = {
                ...pool,
                run_at,
                interval,
                snapshot_timestamp,
              };
            }

            // activity log
            if (!logByPool[pool_id]) logByPool[pool_id] = [];
            logByPool[pool_id].push({
              ...pool,
              run_at,
              interval,
              snapshot_timestamp,
              snapshot_age_minutes,
            });
          }
        }
        for (const pid in logByPool) {
          logByPool[pid].sort((a, b) => b.run_at.localeCompare(a.run_at));
        }

        allPools = Object.keys(poolTS).sort((a, b) => {
          return (
            parseInt(a.replace(/\D+/g, ""), 10) -
            parseInt(b.replace(/\D+/g, ""), 10)
          );
        });

        document.getElementById(
          "grid-label"
        ).textContent = `Live Pool Overview · ${allPools.length} pools`;

        // ── pricing: aggregated prices + token history ────────
        latestAggregated = [];
        latestPoolPrices = {};
        tokenHistory = {};

        // Track latest run_at to extract latestAggregated / latestPoolPrices
        let latestRunAt = null;

        for (const report of reports) {
          const { run_at, pricing } = report;
          if (!pricing) continue;

          // Build token VWAP history from all reports
          for (const agg of pricing.aggregated ?? []) {
            if (agg.internal_price_usd == null) continue;
            if (!tokenHistory[agg.symbol]) {
              tokenHistory[agg.symbol] = {
                timestamps: [],
                internalPrices: [],
                externalPrices: [],
              };
            }
            const th = tokenHistory[agg.symbol];
            th.timestamps.push(run_at);
            th.internalPrices.push(agg.internal_price_usd);
            th.externalPrices.push(agg.external_price_usd);
          }

          if (!latestRunAt || run_at > latestRunAt) {
            latestRunAt = run_at;
            latestAggregated = (pricing.aggregated ?? []).map((a) => ({
              ...a,
              resolution:
                a.resolution ??
                (a.internal_price_usd != null ? "vwap" : "unavailable"),
              warnings: a.warnings ?? [],
            }));
            for (const pp of pricing.pool_prices ?? []) {
              latestPoolPrices[pp.pool_id] = pp;
            }
          }
        }

        // Sort token history by timestamp
        for (const sym of Object.keys(tokenHistory)) {
          const th = tokenHistory[sym];
          const zipped = th.timestamps.map((t, i) => ({
            t,
            ip: th.internalPrices[i],
            ep: th.externalPrices[i],
          }));
          zipped.sort((a, b) => a.t.localeCompare(b.t));
          // Deduplicate by timestamp (keep last for each)
          const seen = new Map();
          for (const z of zipped) seen.set(z.t, z);
          const deduped = Array.from(seen.values());
          th.timestamps = deduped.map((z) => z.t);
          th.internalPrices = deduped.map((z) => z.ip);
          th.externalPrices = deduped.map((z) => z.ep);
        }

        renderAggBar();
      }

      // ══════════════════════════════════════════════════════
      // View management
      // ══════════════════════════════════════════════════════
      function showGrid() {
        currentView = "grid";
        selectedPool = null;
        selectedToken = null;
        destroyCharts();
        document.getElementById("view-grid").classList.remove("hidden");
        document.getElementById("view-detail").classList.add("hidden");
        document.getElementById("view-token").classList.add("hidden");
        renderGrid();
      }

      function showDetail(pool_id) {
        currentView = "detail";
        selectedPool = pool_id;
        document.getElementById("view-grid").classList.add("hidden");
        document.getElementById("view-detail").classList.remove("hidden");
        document.getElementById("view-token").classList.add("hidden");
        renderDetail(pool_id);
      }

      function showTokenDetail(symbol) {
        currentView = "token";
        selectedToken = symbol;
        destroyCharts();
        document.getElementById("view-grid").classList.add("hidden");
        document.getElementById("view-detail").classList.add("hidden");
        document.getElementById("view-token").classList.remove("hidden");
        renderTokenDetail(symbol);
      }

      function destroyCharts() {
        if (priceChart) {
          priceChart.destroy();
          priceChart = null;
        }
        if (volChart) {
          volChart.destroy();
          volChart = null;
        }
        if (usdPriceChart) {
          usdPriceChart.destroy();
          usdPriceChart = null;
        }
        if (tokenVwapChart) {
          tokenVwapChart.destroy();
          tokenVwapChart = null;
        }
      }

      // ══════════════════════════════════════════════════════
      // Aggregated Price Bar
      // ══════════════════════════════════════════════════════
      function renderAggBar() {
        const container = document.getElementById("agg-cards");
        if (!latestAggregated.length) {
          container.innerHTML =
            '<span style="color:var(--text-dim);font-size:11px">No pricing data yet</span>';
          return;
        }

        container.innerHTML = latestAggregated
          .map((agg) => {
            const res = agg.resolution ?? "vwap";
            const warnings = agg.warnings ?? [];
            const divPct = agg.divergence_pct;
            const tol = agg.tolerance_pct ?? TOLERANCE_PCT[agg.symbol] ?? 2;
            const divClass =
              divPct == null
                ? ""
                : agg.is_divergent
                ? "danger"
                : Math.abs(divPct) > tol * 0.5
                ? "warn"
                : "ok";
            const divStr =
              divPct == null
                ? "—"
                : `${divPct >= 0 ? "+" : ""}${divPct.toFixed(4)}% ${
                    agg.is_divergent ? "⚠" : "✓"
                  }`;

            let priceDisplay, extStr, cardClass;
            if (res === "unavailable") {
              const extRef =
                agg.external_price_usd != null
                  ? `$${fmtPrice(agg.external_price_usd)} ext ref`
                  : "no data";
              priceDisplay = `<div class="agg-card-price unavailable">${extRef}</div>`;
              extStr = `no DEX data · <span class="agg-card-badge unavailable">unavailable</span>`;
              cardClass = agg.is_divergent
                ? "agg-card unavailable divergent"
                : "agg-card unavailable";
            } else {
              const badge =
                res === "implied"
                  ? `<span class="agg-card-badge implied">implied</span>`
                  : "";
              priceDisplay = `<div class="agg-card-price">$${fmtPrice(
                agg.internal_price_usd
              )}${badge}</div>`;
              const extLabel =
                agg.external_price_usd != null
                  ? `ext $${fmtPrice(agg.external_price_usd)}`
                  : "no ext";
              extStr = `${extLabel} · ${agg.pool_count} pool${
                agg.pool_count !== 1 ? "s" : ""
              }`;
              cardClass = agg.is_divergent
                ? "agg-card divergent"
                : res === "implied"
                ? "agg-card implied"
                : "agg-card";
            }

            const warnIcon = warnings.length
              ? `<span class="agg-card-warn-icon">⚠<span class="warn-tooltip">${warnings
                  .map((w) => `• ${w}`)
                  .join("<br>")}</span></span>`
              : "";

            return `<div class="${cardClass}" onclick="showTokenDetail('${agg.symbol}')">
  <div class="agg-card-symbol">${agg.symbol}${warnIcon}</div>
  ${priceDisplay}
  <div class="agg-card-ext">${extStr}</div>
  <div class="agg-card-div ${divClass}">${divStr}</div>
</div>`;
          })
          .join("");
      }

      // Returns an extra line for pool cards showing USD price
      function poolUsdLine(pid) {
        const pp = latestPoolPrices[pid];
        if (!pp || pp.base_price_usd == null) return "";
        return ` · $${fmtPrice(pp.base_price_usd)} USD`;
      }

      // ══════════════════════════════════════════════════════
      // Token Detail View
      // ══════════════════════════════════════════════════════
      function renderTokenDetail(symbol) {
        const agg = latestAggregated.find((a) => a.symbol === symbol);
        document.getElementById("t-symbol").textContent = symbol;
        if (agg) {
          const res = agg.resolution ?? "vwap";
          const resLabel =
            res === "implied"
              ? " (implied)"
              : res === "unavailable"
              ? ""
              : " VWAP";
          document.getElementById("t-price").textContent =
            agg.internal_price_usd != null
              ? `$${fmtPrice(agg.internal_price_usd)}${resLabel}`
              : agg.external_price_usd != null
              ? `$${fmtPrice(agg.external_price_usd)} (ext ref only)`
              : "—";
          const divStr =
            agg.divergence_pct != null
              ? `divergence ${
                  agg.divergence_pct >= 0 ? "+" : ""
                }${agg.divergence_pct.toFixed(4)}% (tol ±${agg.tolerance_pct}%)`
              : "no divergence data";
          const divEl = document.getElementById("t-divergence");
          divEl.textContent = divStr;
          divEl.style.color = agg.is_divergent
            ? "var(--red)"
            : "var(--text-dim)";

          // Warnings list
          const warnings = agg.warnings ?? [];
          let warnEl = document.getElementById("t-warnings");
          if (!warnEl) {
            warnEl = document.createElement("div");
            warnEl.id = "t-warnings";
            warnEl.style.cssText =
              "margin-top:8px;font-size:11px;line-height:1.7";
            divEl.parentNode.insertBefore(warnEl, divEl.nextSibling);
          }
          if (warnings.length) {
            warnEl.innerHTML = warnings
              .map((w) => {
                const isError =
                  w.startsWith("No DEX") ||
                  w.startsWith("Price resolution failed") ||
                  w.startsWith("No external");
                const color = isError ? "var(--red)" : "var(--orange)";
                return `<div style="color:${color}">⚠ ${w}</div>`;
              })
              .join("");
          } else {
            warnEl.innerHTML = "";
          }
        }

        const th = tokenHistory[symbol];
        if (!th || !th.timestamps.length) {
          document.querySelector("#view-token .section .chart-wrap").innerHTML =
            '<div class="loading">No history yet</div>';
          return;
        }

        const labels = th.timestamps.map((t) => {
          const d = new Date(t);
          return d.toLocaleTimeString("en-US", {
            hour12: false,
            hour: "2-digit",
            minute: "2-digit",
          });
        });

        // Latest external price as flat reference line
        const latestExt = th.externalPrices[th.externalPrices.length - 1];

        const datasets = [
          {
            label: "VWAP (internal)",
            data: th.internalPrices,
            borderColor: "#89dceb",
            backgroundColor: "rgba(137,220,235,0.06)",
            fill: true,
            borderWidth: 1.5,
            pointRadius: 0,
            tension: 0.2,
          },
        ];

        if (latestExt != null) {
          datasets.push({
            label: "External reference",
            data: th.timestamps.map(() => latestExt),
            borderColor: "rgba(166,227,161,0.6)",
            borderDash: [4, 4],
            fill: false,
            borderWidth: 1,
            pointRadius: 0,
            tension: 0,
          });
        }

        if (tokenVwapChart) {
          tokenVwapChart.destroy();
          tokenVwapChart = null;
        }
        tokenVwapChart = new Chart(
          document.getElementById("token-vwap-chart").getContext("2d"),
          {
            type: "line",
            data: { labels, datasets },
            options: chartOpts((v) => "$" + fmtPrice(v)),
          }
        );
      }

      // ══════════════════════════════════════════════════════
      // Grid View
      // ══════════════════════════════════════════════════════
      function renderGrid() {
        const grid = document.getElementById("pool-grid");
        if (!allPools.length) {
          grid.innerHTML = '<div class="loading">No data available</div>';
          return;
        }

        grid.innerHTML = allPools
          .map((pid) => {
            const s = poolTS[pid];
            if (!s) return "";
            const price = s.prices[s.prices.length - 1];
            const liq = s.liquidity[s.liquidity.length - 1];
            const pair = pairName(s.ticker_id);
            const r30 = latestBI[pid]?.["30min"];
            return `
<div class="pool-card" onclick="showDetail('${pid}')">
  <div class="card-top">
    <div>
      <div class="card-pool-id">${pid}</div>
      <div class="card-pair">${pair}</div>
    </div>
  </div>
  <div class="card-price">${fmtPrice(price)}</div>
  <div class="card-liquidity">Liquidity · $${fmtNum(liq)}${poolUsdLine(
              pid
            )}</div>
  <div class="badge-row">
    ${makeBadge("Price 30m", r30?.last_price?.percent)}
    ${makeBadge("Vol 30m", r30?.base_volume?.percent)}
  </div>
  <div class="sparkline-wrap"><canvas id="spark-${pid}" height="36"></canvas></div>
</div>`;
          })
          .join("");

        // Draw sparklines once layout is committed
        requestAnimationFrame(() => allPools.forEach(drawSparkline));
      }

      function makeBadge(label, pct) {
        if (pct == null || isNaN(pct)) {
          return `<span class="badge badge-neu"><span class="badge-lbl">${label}</span> —</span>`;
        }
        const cls = pct > 0 ? "badge-pos" : pct < 0 ? "badge-neg" : "badge-neu";
        const sign = pct > 0 ? "+" : "";
        return `<span class="badge ${cls}"><span class="badge-lbl">${label}</span> ${sign}${pct.toFixed(
          2
        )}%</span>`;
      }

      function drawSparkline(pid) {
        const canvas = document.getElementById("spark-" + pid);
        if (!canvas) return;
        const s = poolTS[pid];
        if (!s || s.prices.length < 2) return;

        const prices = s.prices; // use all 14 points
        const w = canvas.parentElement.offsetWidth || 260;
        const h = 36;
        canvas.width = w;
        canvas.height = h;

        const ctx = canvas.getContext("2d");
        const min = Math.min(...prices),
          max = Math.max(...prices);
        const range = max - min || 1;
        const px = 3,
          py = 3;

        const toX = (i) => px + (i / (prices.length - 1)) * (w - px * 2);
        const toY = (v) => py + (1 - (v - min) / range) * (h - py * 2);

        const rising = prices[prices.length - 1] >= prices[0];
        const lc = rising ? "#a6e3a1" : "#f38ba8";
        const fc = rising ? "rgba(166,227,161,0.09)" : "rgba(243,139,168,0.09)";

        // gradient fill
        ctx.beginPath();
        ctx.moveTo(toX(0), toY(prices[0]));
        prices.forEach((p, i) => ctx.lineTo(toX(i), toY(p)));
        ctx.lineTo(toX(prices.length - 1), h);
        ctx.lineTo(toX(0), h);
        ctx.closePath();
        ctx.fillStyle = fc;
        ctx.fill();

        // line
        ctx.beginPath();
        ctx.moveTo(toX(0), toY(prices[0]));
        prices.forEach((p, i) => ctx.lineTo(toX(i), toY(p)));
        ctx.strokeStyle = lc;
        ctx.lineWidth = 1.5;
        ctx.lineJoin = "round";
        ctx.stroke();
      }

      // ══════════════════════════════════════════════════════
      // Detail View
      // ══════════════════════════════════════════════════════
      const INTERVALS = ["30min", "2h", "6h", "12h", "24h"];

      function renderDetail(pid) {
        const s = poolTS[pid];
        if (!s) return;
        document.getElementById("d-pair").textContent = pairName(s.ticker_id);
        document.getElementById("d-pool-id").textContent = pid;
        document.getElementById("d-price").textContent = fmtPrice(
          s.prices[s.prices.length - 1]
        );
        document.getElementById("d-ts").textContent =
          "Last: " + fmtTime(s.timestamps[s.timestamps.length - 1]);

        renderVarTable(pid);
        renderCharts(pid, s);
        renderLog(pid);
      }

      // ── Variance class / cell ─────────────────────────────
      function vcClass(pct) {
        if (pct == null || isNaN(pct)) return "vc-null";
        const a = Math.abs(pct);
        if (a === 0) return "vc-zero";
        if (a < 1) return pct > 0 ? "vc-tp" : "vc-tn";
        if (a < 5) return pct > 0 ? "vc-mp" : "vc-mn";
        return pct > 0 ? "vc-bp" : "vc-bn";
      }

      function vcCell(pct) {
        if (pct == null || isNaN(pct)) return '<span class="vc-null">—</span>';
        const sign = pct >= 0 ? "+" : "";
        return `<span class="${vcClass(pct)}">${sign}${pct.toFixed(3)}%</span>`;
      }

      function renderVarTable(pid) {
        document.getElementById("var-body").innerHTML = INTERVALS.map((iv) => {
          const r = latestBI[pid]?.[iv];
          if (!r)
            return `
<tr>
  <td class="iv-cell">${iv}</td>
  <td colspan="4" style="color:var(--text-dim);font-size:11px;">No data yet</td>
</tr>`;
          return `
<tr>
  <td class="iv-cell">${iv}</td>
  <td>${vcCell(r.last_price?.percent)}</td>
  <td>${vcCell(r.base_price_usd?.percent)}</td>
  <td>${vcCell(r.base_volume?.percent)}</td>
  <td>${vcCell(r.target_volume?.percent)}</td>
  <td class="ts-cell">${fmtTime(r.run_at)}</td>
</tr>`;
        }).join("");
      }

      // ── Charts ────────────────────────────────────────────
      function chartOpts(yFmt) {
        return {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          plugins: {
            legend: {
              labels: {
                color: "#585b70",
                font: { family: "monospace", size: 11 },
                boxWidth: 12,
              },
            },
            tooltip: {
              backgroundColor: "#1e1e2e",
              titleColor: "#89dceb",
              bodyColor: "#cdd6f4",
              borderColor: "#313244",
              borderWidth: 1,
            },
          },
          scales: {
            x: {
              ticks: {
                color: "#585b70",
                maxRotation: 0,
                autoSkip: true,
                maxTicksLimit: 8,
                font: { size: 10, family: "monospace" },
              },
              grid: { color: "rgba(30,30,46,0.4)" },
            },
            y: {
              ticks: {
                color: "#585b70",
                font: { size: 10, family: "monospace" },
                callback: yFmt,
              },
              grid: { color: "rgba(30,30,46,0.4)" },
            },
          },
        };
      }

      function renderCharts(pid, s) {
        destroyCharts();

        const labels = s.timestamps.map((t) => {
          const d = new Date(t);
          return d.toLocaleTimeString("en-US", {
            hour12: false,
            hour: "2-digit",
            minute: "2-digit",
          });
        });

        priceChart = new Chart(
          document.getElementById("price-chart").getContext("2d"),
          {
            type: "line",
            data: {
              labels,
              datasets: [
                {
                  label: "Price",
                  data: s.prices,
                  borderColor: "#89dceb",
                  backgroundColor: "rgba(137,220,235,0.06)",
                  fill: true,
                  borderWidth: 1.5,
                  pointRadius: 0,
                  tension: 0.2,
                },
              ],
            },
            options: chartOpts((v) => fmtPrice(v)),
          }
        );

        // USD Price chart: reconstruct from reports for this pool
        const usdHistory = buildPoolUsdHistory(pid);
        if (usdHistory.timestamps.length >= 2) {
          const usdLabels = usdHistory.timestamps.map((t) => {
            const d = new Date(t);
            return d.toLocaleTimeString("en-US", {
              hour12: false,
              hour: "2-digit",
              minute: "2-digit",
            });
          });

          // External reference: use latest external price for this pool's base symbol
          const pp = latestPoolPrices[pid];
          const baseSymbol = pp?.base_symbol;
          const extPrice = baseSymbol
            ? latestAggregated.find((a) => a.symbol === baseSymbol)
                ?.external_price_usd ?? null
            : null;

          const usdDatasets = [
            {
              label: "USD Price",
              data: usdHistory.prices,
              borderColor: "#f9e2af",
              backgroundColor: "rgba(249,226,175,0.06)",
              fill: true,
              borderWidth: 1.5,
              pointRadius: 0,
              tension: 0.2,
            },
          ];
          if (extPrice != null) {
            usdDatasets.push({
              label: "External ref",
              data: usdHistory.timestamps.map(() => extPrice),
              borderColor: "rgba(166,227,161,0.6)",
              borderDash: [4, 4],
              fill: false,
              borderWidth: 1,
              pointRadius: 0,
              tension: 0,
            });
          }

          usdPriceChart = new Chart(
            document.getElementById("usd-price-chart").getContext("2d"),
            {
              type: "line",
              data: { labels: usdLabels, datasets: usdDatasets },
              options: chartOpts((v) => "$" + fmtPrice(v)),
            }
          );
        }

        volChart = new Chart(
          document.getElementById("vol-chart").getContext("2d"),
          {
            type: "line",
            data: {
              labels,
              datasets: [
                {
                  label: "Base Volume",
                  data: s.baseVols,
                  borderColor: "#a6e3a1",
                  backgroundColor: "rgba(166,227,161,0.05)",
                  fill: false,
                  borderWidth: 1.5,
                  pointRadius: 0,
                  tension: 0.2,
                },
                {
                  label: "Target Volume",
                  data: s.targetVols,
                  borderColor: "#fab387",
                  backgroundColor: "rgba(250,179,135,0.05)",
                  fill: false,
                  borderWidth: 1.5,
                  pointRadius: 0,
                  tension: 0.2,
                },
              ],
            },
            options: chartOpts((v) => fmtNum(v)),
          }
        );
      }

      // Build USD price history for a pool from all reports
      function buildPoolUsdHistory(pid) {
        const result = { timestamps: [], prices: [] };
        const seen = new Map();
        for (const report of reports) {
          const { run_at, pricing } = report;
          if (!pricing) continue;
          const pp = pricing.pool_prices?.find((p) => p.pool_id === pid);
          if (pp?.base_price_usd != null) {
            seen.set(run_at, pp.base_price_usd);
          }
        }
        const sorted = Array.from(seen.entries()).sort((a, b) =>
          a[0].localeCompare(b[0])
        );
        for (const [ts, price] of sorted) {
          result.timestamps.push(ts);
          result.prices.push(price);
        }
        return result;
      }

      // ── Activity Log ──────────────────────────────────────
      function renderLog(pid) {
        const el = document.getElementById("act-log");
        const entries = logByPool[pid];
        if (!entries?.length) {
          el.innerHTML =
            '<span style="color:var(--text-dim)">No activity logged</span>';
          return;
        }

        // Group by run_at (preserve sort: newest first)
        const grouped = new Map();
        for (const e of entries) {
          if (!grouped.has(e.run_at)) grouped.set(e.run_at, []);
          grouped.get(e.run_at).push(e);
        }

        const html = [];
        let first = true;
        for (const [run_at, group] of grouped) {
          html.push(
            `<div class="log-run${
              first ? "" : ""
            }" >════ Job run at: ${run_at} ════</div>`
          );
          first = false;

          for (const entry of group) {
            const age =
              entry.snapshot_age_minutes != null
                ? `${entry.snapshot_age_minutes}min`
                : entry.interval;
            html.push(
              `<div class="log-iv">  Interval: ${entry.interval} | snapshot from ${age} ago</div>`
            );

            for (const field of [
              "last_price",
              "base_volume",
              "target_volume",
            ]) {
              const f = entry[field];
              if (!f) continue;
              const fmt = field === "last_price" ? fmtPrice : fmtNum;
              const prev = fmt(f.previous);
              const curr = fmt(f.current);
              const delta = f.absolute;
              const pct = f.percent;

              const dCls = delta > 0 ? "ld-p" : delta < 0 ? "ld-n" : "ld-z";
              const pCls =
                pct != null && pct > 0
                  ? "lpc-p"
                  : pct != null && pct < 0
                  ? "lpc-n"
                  : "lpc-z";
              const dStr = delta >= 0 ? `+${fmt(delta)}` : fmt(delta);
              const pStr =
                pct == null
                  ? "null"
                  : `${pct >= 0 ? "+" : ""}${pct.toFixed(3)}%`;
              const label = field.padEnd(13, "\u00a0"); // non-breaking space padding

              html.push(`<div class="log-line">
  <span class="log-fn">${label}</span>
  <span class="log-vals">
    <span class="lp">prev=${prev}</span>
    <span class="lc">curr=${curr}</span>
    <span class="${dCls}">delta=${dStr}</span>
    <span class="${pCls}">(${pStr})</span>
  </span>
</div>`);
            }
          }
        }

        el.innerHTML = html.join("");
      }

      // ══════════════════════════════════════════════════════
      // Auto-refresh (60s countdown)
      // ══════════════════════════════════════════════════════
      function startCountdown() {
        countdownVal = 60;
        if (countdownTimer) clearInterval(countdownTimer);
        countdownTimer = setInterval(async () => {
          countdownVal--;
          const el = document.getElementById("countdown");
          if (el) el.textContent = countdownVal;
          if (countdownVal <= 0) {
            countdownVal = 60;
            if (el) el.textContent = countdownVal;
            try {
              await fetchData();
              if (currentView === "grid") renderGrid();
              else if (currentView === "detail" && selectedPool)
                renderDetail(selectedPool);
              else if (currentView === "token" && selectedToken)
                renderTokenDetail(selectedToken);
            } catch (e) {
              console.error("Refresh error:", e);
            }
          }
        }, 1000);
      }

      // ══════════════════════════════════════════════════════
      // Boot
      // ══════════════════════════════════════════════════════
      (async () => {
        try {
          await fetchData();
          renderGrid();
        } catch (e) {
          document.getElementById(
            "pool-grid"
          ).innerHTML = `<div class="loading" style="color:var(--red)">Error: ${e.message} — serve with: npx serve . -l 5000</div>`;
          console.error(e);
        }
        startCountdown();
      })();
    </script>
  </body>
</html>
